<!DOCTYPE html>

<body>
  <!--
    NOTE ON ES MODULES & file:// PROTOCOL
    ======================================
    This app uses ES modules (import/export). Most browsers block ES module
    loading from the file:// protocol due to CORS restrictions.
    To run locally, use a simple HTTP server:
      Python 3:  python -m http.server 8000
      Node.js:   npx serve .
    Then open http://localhost:8000 in your browser.
    Alternatively, Firefox allows ES modules over file:// by default.
  -->
  <div id="app"></div>
  <script type="module" src="ui/app.js"></script>
</body>
</html>
